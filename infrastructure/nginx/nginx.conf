load_module "/usr/local/openresty/nginx/modules/ngx_http_modsecurity_module.so";

env REDIS_HOST;
env REDIS_PORT;
env REDIS_KEY_PREFIX;
env WEBSITE_URL;
env BACKEND_API_URL;
env ACTUATOR_CONFIRM_TOKEN;

    events {
        worker_connections 10240;
    }

    http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # Enable Lua code cache for performance
    lua_code_cache on;

    # Shared dict for local policy caching (reduces Redis queries per request)
    lua_shared_dict policy_cache 10m;

    # Docker internal DNS resolver
    resolver 127.0.0.11 ipv6=off;

        server {
            listen 80;
            server_name localhost;

        # Health check endpoint (used by Docker HEALTHCHECK)
        location /health {
            access_log off;
            modsecurity off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Internal callback endpoint for gateway actuator -> backend enforcement confirmation
        location = /__policy/enforcement-confirm {
            internal;
            access_log off;
            modsecurity off;
            proxy_http_version 1.1;
            proxy_set_header Host backend;
            proxy_set_header Connection "";
            proxy_set_header Content-Type "application/json";
            proxy_set_header X-Actuator-Token $actuator_confirm_token;
            proxy_connect_timeout 100ms;
            proxy_send_timeout 150ms;
            proxy_read_timeout 150ms;
            proxy_pass $backend_api_url;
        }

        # 1. Enable ModSecurity
            modsecurity on;
            modsecurity_rules_file /etc/modsecurity.d/main.conf;
            
        # 2. Enable Lua Gateway Actuator
        # It runs for every request to check against Redis policies
            location / {
            access_by_lua_file /usr/local/openresty/nginx/lua/access_check.lua;

            # Dynamic backend resolution
            set_by_lua_block $backend_url {
                return os.getenv("WEBSITE_URL") or "http://backend:3000"
            }

            set_by_lua_block $backend_api_url {
                return os.getenv("BACKEND_API_URL") or "http://backend:3000/api/actions/enforcement/confirm"
            }

            set_by_lua_block $actuator_confirm_token {
                return os.getenv("ACTUATOR_CONFIRM_TOKEN") or ""
            }
            
            proxy_pass $backend_url;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;   
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
