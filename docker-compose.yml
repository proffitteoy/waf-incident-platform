services:
  postgres:
    image: postgres:16
    container_name: waf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: waf_incident
      POSTGRES_USER: waf_user
      POSTGRES_PASSWORD: waf_password
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - waf-net

  redis:
    image: redis:7-alpine
    container_name: waf-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - waf-net

  # 后端服务：负责日志分析、策略执行与API
  backend:
    image: node:20-alpine
    container_name: waf-backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./storage/logs:/app/storage/logs
      - ./storage/pcap:/app/storage/pcap
      - ./services/forensics-worker:/services/forensics-worker
    environment:
      - BACKEND_PORT=3000
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=waf_user
      - POSTGRES_PASSWORD=waf_password
      - POSTGRES_DB=waf_incident
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BACKEND_API_URL=http://localhost:3000
      - FORENSICS_PYTHON_BIN=python3
      - FORENSICS_DOWNLOAD_TOKEN_REQUIRED=false
      - FORENSICS_DOWNLOAD_SIGNING_SECRET=change-this-forensics-secret
      - FORENSICS_DOWNLOAD_URL_TTL_SECONDS=300
    command: sh -c "apk add --no-cache python3 tshark && if [ ! -x node_modules/.bin/ts-node-dev ]; then npm install; fi && npm run dev"
    depends_on:
      - postgres
      - redis
    ports:
      - "3000:3000"
    networks:
      - waf-net

  # 前端服务：仪表盘可视化
  frontend:
    image: node:20-alpine
    container_name: waf-frontend
    working_dir: /app
    volumes:
      - ./frontends:/app
      - /app/node_modules
    command: sh -c "if [ ! -x node_modules/.bin/vite ]; then npm install; fi && npm run dev -- --host"
    environment:
      - VITE_API_PROXY_TARGET=http://backend:3000
    ports:
      - "5173:5173"
    networks:
      - waf-net

  # WAF网关：OpenResty + ModSecurity + Lua Actuator
  waf:
    build:
      context: ./infrastructure/waf
      dockerfile: Dockerfile
    container_name: waf-gateway
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "80:80"
    environment:
      # 目标网站地址由 ./backend/.env 的 WEBSITE_URL 提供
      # Redis 连接配置 (供 Lua 脚本使用)
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_KEY_PREFIX=waf:mvp
    volumes:
      # OpenResty Nginx 配置文件
      - ./infrastructure/nginx/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf
      # Lua 脚本
      - ./infrastructure/waf/runtime/access_check.lua:/usr/local/openresty/nginx/lua/access_check.lua
      # WAF 规则与配置
      - ./infrastructure/waf/runtime/modsecurity3.conf:/etc/modsecurity.d/modsecurity.conf
      - ./infrastructure/waf/runtime/crs-setup.conf:/etc/modsecurity.d/crs-setup.conf
      - ./infrastructure/waf/runtime/10-project-overrides.conf:/etc/modsecurity.d/10-project-overrides.conf
      - ./infrastructure/waf/runtime/main.conf:/etc/modsecurity.d/main.conf
      - ./infrastructure/waf/runtime/rules:/etc/modsecurity.d/rules
      # 日志共享
      - ./storage/logs:/var/log/modsec
    depends_on:
      - backend
      - redis
    networks:
      - waf-net

  # 取证 Worker：负责调用 tshark 抓包
  forensics-worker:
    image: python:3.10-slim
    container_name: waf-forensics
    working_dir: /app
    volumes:
      - ./services/forensics-worker:/app
      - ./storage/pcap:/app/storage/pcap
    # 共享 WAF 的网络栈以实现流量抓取
    network_mode: "service:waf"
    cap_add:
      - NET_ADMIN
    # 需预先安装 tshark
    command: sh -c "apt-get update && apt-get install -y tshark && pip install -r requirements.txt && python src/capture.py"
    depends_on:
      - waf

volumes:
  postgres_data:

networks:
  waf-net:
    driver: bridge
