# Project overrides for Coraza runtime.

# Safer initial deployment mode.
SecRuleEngine On

# Keep audit evidence and make ingestion easier.
SecAuditEngine RelevantOnly
SecAuditLogType Serial
SecAuditLogFormat JSON
SecAuditLogParts ABIJDEFHZ
SecAuditLog /var/log/modsec/waf-audit.log

# Keep request/response inspection enabled for MVP evidence quality.
SecRequestBodyAccess On
SecResponseBodyAccess On

# Keep CRS anomaly scoring defaults; high risk switching is managed by our policy engine.
